name: bench

on:
  push:
    paths: [ ".github/workflows/bench.yml", "leak-bench.pl" ]
  workflow_dispatch:

jobs:
  bench:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        perl:
          - '5.12.5'
          - '5.16.3'
          - '5.20.3'
          - '5.26.3'
          - '5.32.1'
          - '5.36.3'
          - '5.38.5'
          - '5.40.4'
          - '5.42.2'
    name: perl ${{ matrix.perl }}
    steps:
      - uses: actions/checkout@v5
      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl }}
      - name: bench
        run: perl leak-bench.pl 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
